name: live-smoke

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  smoke:
    name: Live API smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Skip nightly runs when no API key secret is configured (forks, fresh clones).
    # Manual workflow_dispatch still runs so maintainers can opt in explicitly.
    if: ${{ github.event_name == 'workflow_dispatch' || vars.LIVE_SMOKE_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Run live smoke tests
        env:
          LEMON_SQUEEZY_LIVE_SMOKE: "1"
          LEMON_SQUEEZY_API_KEY: ${{ secrets.LEMON_SQUEEZY_API_KEY }}
          LEMON_SQUEEZY_STORE_ID: ${{ secrets.LEMON_SQUEEZY_STORE_ID }}
          LEMON_SQUEEZY_MODE: ${{ secrets.LEMON_SQUEEZY_MODE || 'test' }}
        run: npm run test:live
