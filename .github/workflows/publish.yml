# Publish to npm
# ──────────────
# Manual fallback publish workflow.
# Uses npm trusted publishing (OIDC), no NPM token required.
# Keep node@24 to ensure npm >= 11.5.1.

name: Publish Package

on:
  push:
    tags:
      - "v*.*.*"
  # GITHUB_TOKEN-triggered tag pushes do not fire the `push` event in downstream workflows.
  # workflow_run fires after Release completes, letting this job publish the bumped version.
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    # Run on direct tag pushes (manual/external) OR after a successful Release workflow run.
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Verify Node/npm
        run: |
          node -v
          npm -v
          test "$(printf '%s\n' "11.5.1" "$(npm -v)" | sort -V | head -1)" = "11.5.1" || {
            echo "::error::npm $(npm -v) is below 11.5.1; publishing is not supported"
            exit 1
          }

      - name: Publish to npm (trusted publishing)
        run: npm publish --access public --provenance
